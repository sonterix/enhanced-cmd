name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bigwigsmods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_CURSE_ID: 1479749